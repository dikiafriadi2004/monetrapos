name: monetrapos_mobile
description: "MonetraPOS Mobile - Point of Sale Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & API
  dio: ^5.7.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Local Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Navigation
  go_router: ^14.6.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Barcode Scanner
  mobile_scanner: ^5.2.3

  # Image Picker
  image_picker: ^1.1.2

  # Charts
  fl_chart: ^0.69.0

  # Utils
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
